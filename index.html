<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>중학 공부는 역시 YGMQ와 함께!</title>
    <style>
        /* ==========================================
           1. 폰트 설정 (Pretendard)
        ========================================== */
        @font-face { font-family: 'Pretendard'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/pretendard@1.0/Pretendard-Thin.woff2') format('woff2'); font-weight: 100; font-display: swap; }
        @font-face { font-family: 'Pretendard'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/pretendard@1.0/Pretendard-ExtraLight.woff2') format('woff2'); font-weight: 200; font-display: swap; }
        @font-face { font-family: 'Pretendard'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/pretendard@1.0/Pretendard-Light.woff2') format('woff2'); font-weight: 300; font-display: swap; }
        @font-face { font-family: 'Pretendard'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/pretendard@1.0/Pretendard-Regular.woff2') format('woff2'); font-weight: 400; font-display: swap; }
        @font-face { font-family: 'Pretendard'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/pretendard@1.0/Pretendard-Medium.woff2') format('woff2'); font-weight: 500; font-display: swap; }
        @font-face { font-family: 'Pretendard'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/pretendard@1.0/Pretendard-SemiBold.woff2') format('woff2'); font-weight: 600; font-display: swap; }
        @font-face { font-family: 'Pretendard'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/pretendard@1.0/Pretendard-Bold.woff2') format('woff2'); font-weight: 700; font-display: swap; }
        @font-face { font-family: 'Pretendard'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/pretendard@1.0/Pretendard-ExtraBold.woff2') format('woff2'); font-weight: 800; font-display: swap; }
        @font-face { font-family: 'Pretendard'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/pretendard@1.0/Pretendard-Black.woff2') format('woff2'); font-weight: 900; font-display: swap; }

        /* ==========================================
           2. Google & Gemini 디자인 시스템 변수
        ========================================== */
        :root {
            --google-blue: #1a73e8;
            --google-gray-100: #f8f9fa;
            --google-gray-200: #e8eaed;
            --google-gray-700: #3c4043;
            --text-primary: #1f1f1f;
            --text-secondary: #5f6368;
            --bg-surface: #ffffff;
            --bg-container: #f0f4f9; 
            --gemini-gradient: linear-gradient(90deg, #4285f4 0%, #9b72cb 50%, #d96570 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-container);
            color: var(--text-primary);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            overflow-y: scroll; /* 스크롤바 이동 방지 */
        }

        /* ==========================================
           3. 공통 레이아웃 & 헤더
        ========================================== */
        header {
            background-color: var(--bg-surface);
            padding: 3rem 1.5rem;
            text-align: center;
            border-bottom: 1px solid var(--google-gray-200);
        }

        .header-container { max-width: 800px; margin: 0 auto; }

        header h1 {
            font-size: 2.4rem;
            font-weight: 700;
            margin-bottom: 0.75rem;
            letter-spacing: -0.75px;
            background: var(--gemini-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: inline-block;
        }

        header p { color: var(--text-secondary); font-size: 1.1rem; font-weight: 500; }

        main {
            padding: 3rem 1.5rem;
            max-width: 1080px;
            margin: 0 auto;
            min-height: 60vh;
        }

        /* ==========================================
           4. 단계별 섹션 전환 애니메이션
        ========================================== */
        .step-section {
            display: none;
            animation: fadeInUp 0.4s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        .step-section.active {
            display: block;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .section-header {
            display: flex;
            align-items: center;
            margin-bottom: 2rem;
            gap: 1rem;
        }

        .section-title {
            font-size: 1.4rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        /* 뒤로 가기 버튼 (아이콘 전용 둥근 버튼으로 수정) */
        .btn-back {
            background: transparent;
            border: 1px solid var(--google-gray-200);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-back:hover {
            background: var(--google-gray-100);
            color: var(--text-primary);
            border-color: var(--google-gray-700);
        }

        .btn-back svg { width: 22px; height: 22px; fill: currentColor; }

        /* ==========================================
           5. 카드 공통 스타일 (Grid)
        ========================================== */
        .card-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.5rem;
        }

        .custom-card {
            background: var(--bg-surface);
            padding: 2rem;
            border-radius: 24px;
            border: 1px solid transparent;
            box-shadow: 0 1px 2px 0 rgba(60,64,67,0.1), 0 2px 6px 2px rgba(60,64,67,0.05);
            text-align: left;
            position: relative;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
        }

        .custom-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 6px; height: 100%;
            background: var(--subject-color, var(--google-blue)); 
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .custom-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 4px 12px 0 rgba(60,64,67,0.15), 0 8px 24px 3px rgba(60,64,67,0.1);
            border-color: var(--google-gray-200);
        }

        .custom-card:hover::before { opacity: 1; }

        .card-title-wrapper {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 0.5rem;
        }

        .card-title { font-size: 1.25rem; font-weight: 700; color: var(--text-primary); }
        .card-desc { font-size: 0.95rem; color: var(--text-secondary); font-weight: 400; }

        .arrow-icon {
            width: 24px; height: 24px;
            fill: var(--text-secondary);
            transition: fill 0.2s, transform 0.2s;
        }

        .custom-card:hover .arrow-icon {
            fill: var(--subject-color, var(--google-blue));
            transform: translateX(4px);
        }

        .grade-card { --subject-color: var(--google-blue); }

        /* 반응형 미디어 쿼리 설정 */
        @media (min-width: 600px) { .card-container { grid-template-columns: repeat(2, 1fr); } }
        @media (min-width: 960px) { .card-container { grid-template-columns: repeat(3, 1fr); } }
    </style>
</head>
<body>

    <header>
        <div class="header-container">
            <h1>중학 공부는 역시 YGMQ와 함께!</h1>
            <p>YGMQ로 공부해서 성적을 높여보세요!</p>
        </div>
    </header>
    
    <main>
        <!-- [Step 1] 학년 선택 섹션 -->
        <div id="step-grade" class="step-section active">
            <div class="section-header">
                <h2 class="section-title">1. 학년 선택</h2>
            </div>
            
            <div class="card-container">
                <div class="custom-card grade-card" onclick="selectGrade(1)">
                    <div class="card-title-wrapper">
                        <span class="card-title">1학년</span>
                        <svg class="arrow-icon" viewBox="0 0 24 24"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6-1.41-1.41z"/></svg>
                    </div>
                    <p class="card-desc">국어, 영어, 수학, 사회, 과학 지원</p>
                </div>
                
                <div class="custom-card grade-card" onclick="selectGrade(2)">
                    <div class="card-title-wrapper">
                        <span class="card-title">2학년</span>
                        <svg class="arrow-icon" viewBox="0 0 24 24"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6-1.41-1.41z"/></svg>
                    </div>
                    <p class="card-desc">국어, 영어, 수학, 사회, 과학, 역사, 도덕 지원</p>
                </div>
                
                <div class="custom-card grade-card" onclick="selectGrade(3)">
                    <div class="card-title-wrapper">
                        <span class="card-title">3학년</span>
                        <svg class="arrow-icon" viewBox="0 0 24 24"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6-1.41-1.41z"/></svg>
                    </div>
                    <p class="card-desc">국어, 영어, 수학, 과학, 역사, 한문 지원</p>
                </div>
            </div>
        </div>

        <!-- [Step 2] 과목 선택 섹션 -->
        <div id="step-subject" class="step-section">
            <div class="section-header">
                <!-- 이전으로 텍스트 제거 및 aria-label로 접근성 유지 -->
                <button class="btn-back" onclick="goBackToGrades()" aria-label="이전 화면으로 돌아가기">
                    <svg viewBox="0 0 24 24"><path d="M15.41 16.59L10.83 12l4.58-4.59L14 6l-6 6 6 6 1.41-1.41z"/></svg>
                </button>
                <h2 id="dynamic-subject-title" class="section-title">2. 학습 과목 선택</h2>
            </div>
            
            <div id="subject-list" class="card-container"></div>
        </div>
    </main>

    <script>
        /* ==========================================
           JavaScript: 데이터 및 화면 전환 로직
        ========================================== */

        // 3학년 데이터에서 사회(soc)와 도덕(mor)을 제외하도록 grades 배열 수정
        const allSubjects = [
            { id: 'kor', name: '국어', desc: '교과서 단원별 핵심 지문 및 빈출 문제', color: '#EA4335', grades: [1, 2, 3] },
            { id: 'eng', name: '영어', desc: '본문 암기 체크 및 핵심 문법·독해 연습', color: '#FBBC04', grades: [1, 2, 3] },
            { id: 'math', name: '수학', desc: '개념 확인 문제부터 수준별 응용·고난도 유형', color: '#4285F4', grades: [1, 2, 3] },
            { id: 'soc', name: '사회', desc: '주요 개념 요약 및 흐름 파악 실전 평가', color: '#8BC34A', grades: [1, 2] },
            { id: 'sci', name: '과학', desc: '실험 탐구 분석 및 대단원별 모의고사', color: '#1A237E', grades: [1, 2, 3] },
            { id: 'his', name: '역사', desc: '시대별 핵심 연표 정리 및 객관식·서술형 대비', color: '#FF9800', grades: [2, 3] },
            { id: 'mor', name: '도덕', desc: '가치 판단 단원 이론 점검 및 단원별 퀴즈', color: '#03A9F4', grades: [2] },
            { id: 'han', name: '한문', desc: '필수 한자어 및 기초 한문 독해 연습', color: '#9C27B0', grades: [3] }
        ];

        function selectGrade(grade) {
            // URL 주소창 변경 로직 추가 (예: ygmq.site/1)
            history.pushState({ step: 'subject', grade: grade }, '', '/' + grade);

            document.getElementById('step-grade').classList.remove('active');
            
            setTimeout(() => {
                document.getElementById('step-subject').classList.add('active');
                document.getElementById('dynamic-subject-title').innerText = `2. 학습 과목 선택`;
                renderSubjects(grade);
            }, 50);
        }

        function renderSubjects(grade) {
            const subjectListContainer = document.getElementById('subject-list');
            subjectListContainer.innerHTML = '';

            const filteredSubjects = allSubjects.filter(sub => sub.grades.includes(grade));

            filteredSubjects.forEach(sub => {
                const cardHTML = `
                    <div class="custom-card" style="--subject-color: ${sub.color};" onclick="goToQuiz('${sub.id}')">
                        <div class="card-title-wrapper">
                            <span class="card-title">${sub.name}</span>
                            <svg class="arrow-icon" viewBox="0 0 24 24"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6-1.41-1.41z"/></svg>
                        </div>
                        <p class="card-desc">${sub.desc}</p>
                    </div>
                `;
                subjectListContainer.insertAdjacentHTML('beforeend', cardHTML);
            });
        }

        function goBackToGrades() {
            // 뒤로가기 시 기본 도메인 주소로 원상 복구 (예: ygmq.site/)
            history.pushState({ step: 'grade' }, '', '/');

            document.getElementById('step-subject').classList.remove('active');
            
            setTimeout(() => {
                document.getElementById('step-grade').classList.add('active');
            }, 50);
        }

        function goToQuiz(subjectId) {
            alert("이 과목은 현재 개발중입니다.");
        }

        // 브라우저의 뒤로가기/앞으로가기 버튼을 눌렀을 때 화면이 동기화되도록 처리
        window.addEventListener('popstate', (event) => {
            if (event.state && event.state.step === 'subject') {
                document.getElementById('step-grade').classList.remove('active');
                document.getElementById('step-subject').classList.add('active');
                renderSubjects(event.state.grade);
            } else {
                document.getElementById('step-subject').classList.remove('active');
                document.getElementById('step-grade').classList.add('active');
            }
        });
    </script>
</body>
</html>
